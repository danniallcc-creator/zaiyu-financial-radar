<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>全球上市公司财务雷达</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0a0a0f',
            card: '#111118',
            border: '#1e1e2a',
            gold: '#d4af37',
            'gold-light': '#e8d49b',
            'gold-dark': '#c9a84c',
            'txt': '#e8d49b',
            'txt-dim': '#8a8a6a',
            up: '#e74c3c',
            down: '#27ae60',
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', '"SF Mono"', 'Menlo', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { background: #0a0a0f; color: #e8d49b; font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
    table { border-collapse: collapse; }
    th { position: sticky; top: 0; z-index: 1; }
    .overflow-x-auto { -webkit-overflow-scrolling: touch; }
    @media (max-width: 768px) {
      .overflow-x-auto table { min-width: 600px; }
      th, td { padding: 6px 8px !important; font-size: 10px !important; }
    }
    button { -webkit-tap-highlight-color: transparent; user-select: none; }
    input { font-size: 16px !important; } /* prevent iOS zoom on focus */
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // ─── Helpers ────────────────────────────────────────────────────────────
    const formatNum = (val, currency) => {
      if (val == null || isNaN(val)) return '-';
      const abs = Math.abs(val);
      if (currency === 'USD') {
        if (abs >= 1e9) return '$' + (val / 1e9).toFixed(1) + 'B';
        if (abs >= 1e6) return '$' + (val / 1e6).toFixed(1) + 'M';
        if (abs >= 1e3) return '$' + (val / 1e3).toFixed(1) + 'K';
        return '$' + val.toFixed(2);
      }
      if (abs >= 1e8) return (val / 1e8).toFixed(1) + '亿';
      if (abs >= 1e4) return (val / 1e4).toFixed(1) + '万';
      return val.toFixed(2);
    };

    const formatPct = (val) => {
      if (val == null || isNaN(val)) return '-';
      return (val >= 0 ? '+' : '') + val.toFixed(2) + '%';
    };

    const yoyColor = (val) => {
      if (val == null || isNaN(val)) return 'text-txt-dim';
      if (val > 20) return 'text-up font-bold';
      if (val < -20) return 'text-down font-bold';
      if (val > 0) return 'text-up';
      if (val < 0) return 'text-down';
      return 'text-txt-dim';
    };

    const calcCAGR = (values) => {
      if (!values || values.length < 2) return null;
      const first = values[values.length - 1];
      const last = values[0];
      if (!first || first <= 0 || !last || last <= 0) return null;
      const n = values.length - 1;
      return ((Math.pow(last / first, 1 / n) - 1) * 100);
    };

    const safeNum = (v) => (v != null && !isNaN(v)) ? v : null;

    const filterAnnual = (arr) => {
      if (!arr) return [];
      return arr.filter(r => r.reportType === '年报' || (r.reportName && r.reportName.includes('年报')));
    };

    // ─── Data Path Detection ─────────────────────────────────────────────────
    // Auto-detect: if served from project root, data is at data/; if from frontend/, use ../data/
    const DATA_BASE = window.location.pathname.includes('/frontend/') ? '../data' : 'data';
    // Worker API: use CF Workers URL when on GitHub Pages, same origin when on CF Pages
    const API_BASE = window.location.hostname.includes('github.io')
      ? 'https://financial-radar-api.workers.dev/api'
      : '/api';

    const detectMarket = (code) => {
      if (/^[A-Za-z]/.test(code)) return 'us';
      if (/^\d{5}$/.test(code)) return 'hk';
      return 'cn';
    };

    const fileFor = (code) => {
      const m = detectMarket(code);
      if (m === 'us') return `us_${code}.json`;
      if (m === 'hk') return `hk_${code}.json`;
      return `${code}.json`;
    };

    const fetchData = async (code) => {
      const market = detectMarket(code);
      const [emResult, cnResult, indResult, ovResult] = await Promise.allSettled([
        fetch(`${DATA_BASE}/eastmoney/${fileFor(code)}`).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
        market === 'cn' ? fetch(`${DATA_BASE}/cninfo/${code}_sections.json`).then(r => { if (!r.ok) throw new Error('no cninfo'); return r.json(); }) : Promise.reject('skip'),
        market === 'cn' ? fetch(`${DATA_BASE}/industry/${code}_peers.json`).then(r => { if (!r.ok) throw new Error('no industry'); return r.json(); }) : Promise.reject('skip'),
        market === 'cn' ? fetch(`${DATA_BASE}/overseas/${code}.json`).then(r => { if (!r.ok) throw new Error('no overseas'); return r.json(); }) : Promise.reject('skip')
      ]);
      if (emResult.status !== 'fulfilled') throw emResult.reason;
      const data = emResult.value;
      if (cnResult.status === 'fulfilled') data.cninfo = cnResult.value;
      if (indResult.status === 'fulfilled') data.industryPeers = indResult.value;
      if (ovResult.status === 'fulfilled') data.overseas = ovResult.value;

      // Try fetching real-time quote from Worker API (non-blocking)
      if (!data.quote || !data.quote.price) {
        try {
          const qResp = await fetch(`${API_BASE}/quote?code=${code}`).then(r => r.ok ? r.json() : null);
          if (qResp && qResp.price) data.quote = qResp;
        } catch (_) { /* quote unavailable, not critical */ }
      }

      return data;
    };

    // ─── Reusable Components ────────────────────────────────────────────────
    const InfoCard = ({ title, children, className = '' }) => (
      <div className={`bg-card border border-border rounded p-4 ${className}`}>
        {title && <h3 className="text-gold font-bold text-sm mb-3 border-b border-border pb-2">{title}</h3>}
        {children}
      </div>
    );

    const MetricTable = ({ headers, rows, className = '' }) => (
      <div className={`overflow-x-auto ${className}`}>
        <table className="w-full text-xs">
          <thead>
            <tr className="bg-bg border-b border-border">
              {headers.map((h, i) => (
                <th key={i} className="text-left text-gold-dark px-3 py-2 font-medium whitespace-nowrap">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, ri) => (
              <tr key={ri} className="border-b border-border hover:bg-[#161620] transition-colors">
                {row.map((cell, ci) => (
                  <td key={ci} className={`px-3 py-2 whitespace-nowrap ${cell.cls || ''}`}>
                    {cell.v != null ? cell.v : '-'}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );

    const Badge = ({ text, color }) => {
      const colorMap = {
        green: 'bg-green-900/40 text-green-400 border-green-700',
        red: 'bg-red-900/40 text-red-400 border-red-700',
        blue: 'bg-blue-900/40 text-blue-400 border-blue-700',
        purple: 'bg-purple-900/40 text-purple-400 border-purple-700',
        orange: 'bg-orange-900/40 text-orange-400 border-orange-700',
      };
      return (
        <span className={`text-[10px] px-1.5 py-0.5 rounded border ${colorMap[color] || colorMap.blue}`}>
          {text}
        </span>
      );
    };

    // ─── SearchBar ──────────────────────────────────────────────────────────
    const QUICK_STOCKS_BY_MARKET = {
      cn: [['600519', '茅台'], ['000858', '五粮液'], ['000001', '平安银行'],
           ['601318', '中国平安'], ['600036', '招商银行'], ['300750', '宁德时代'],
           ['002594', '比亚迪'], ['600900', '长江电力']],
      us: [['AAPL', '苹果'], ['MSFT', '微软'], ['NVDA', '英伟达'],
           ['GOOGL', '谷歌'], ['AMZN', '亚马逊'], ['META', 'Meta'],
           ['TSLA', '特斯拉'], ['BRK.B', '伯克希尔']],
      hk: [['00700', '腾讯'], ['09988', '阿里巴巴'], ['03690', '美团'],
           ['00941', '中国移动'], ['01211', '比亚迪(H)'], ['01810', '小米'],
           ['09618', '京东'], ['02318', '中国平安(H)']],
    };

    const SearchBar = ({ onLoad, market = 'cn' }) => {
      const [code, setCode] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [stockIndex, setStockIndex] = useState(null);
      const [suggestions, setSuggestions] = useState([]);
      const [selIdx, setSelIdx] = useState(-1);
      const [showDrop, setShowDrop] = useState(false);
      const inputRef = React.useRef(null);
      const dropRef = React.useRef(null);

      // Load stock name index on mount
      React.useEffect(() => {
        fetch(`${DATA_BASE}/stock_names.json`)
          .then(r => r.ok ? r.json() : [])
          .then(data => setStockIndex(data))
          .catch(() => {});
      }, []);

      // Close dropdown on outside click
      React.useEffect(() => {
        const handler = (e) => {
          if (dropRef.current && !dropRef.current.contains(e.target) &&
              inputRef.current && !inputRef.current.contains(e.target)) {
            setShowDrop(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const doSearch = async (c) => {
        if (!c) return;
        setLoading(true);
        setError('');
        setShowDrop(false);
        setSuggestions([]);
        try {
          const data = await fetchData(c);
          onLoad(data);
        } catch (e) {
          setError(`加载失败: ${e.message}，请确认 ${DATA_BASE}/eastmoney/${fileFor(c)} 存在`);
        } finally {
          setLoading(false);
        }
      };

      const handleInput = (e) => {
        const val = e.target.value;
        setCode(val);
        setSelIdx(-1);

        if (!val.trim() || !stockIndex) {
          setSuggestions([]);
          setShowDrop(false);
          return;
        }

        const q = val.trim().toLowerCase();
        const isCode = /^[\dA-Za-z]/.test(q);
        let matched;
        // Filter by current market
        const marketFiltered = stockIndex.filter(s => (s.m || 'cn') === market);
        if (isCode) {
          matched = marketFiltered.filter(s => s.c.toLowerCase().startsWith(q));
        } else {
          matched = marketFiltered.filter(s => s.n.toLowerCase().includes(q));
        }
        const top = matched.slice(0, 10);
        setSuggestions(top);
        setShowDrop(top.length > 0);
      };

      const handleKey = (e) => {
        if (!showDrop || suggestions.length === 0) {
          if (e.key === 'Enter') {
            // If input looks like a name, try to resolve to code
            const val = code.trim();
            if (val && stockIndex && !/^\d/.test(val)) {
              const match = stockIndex.find(s => (s.m || 'cn') === market && s.n === val);
              if (match) { setCode(match.c); doSearch(match.c); return; }
            }
            doSearch(code.trim());
          }
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          setSelIdx(i => (i + 1) % suggestions.length);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setSelIdx(i => (i - 1 + suggestions.length) % suggestions.length);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const idx = selIdx >= 0 ? selIdx : 0;
          const pick = suggestions[idx];
          if (pick) {
            setCode(pick.c);
            doSearch(pick.c);
          }
        } else if (e.key === 'Escape') {
          setShowDrop(false);
        }
      };

      const QUICK_STOCKS = QUICK_STOCKS_BY_MARKET[market] || QUICK_STOCKS_BY_MARKET.cn;

      const placeholderText = market === 'us' ? '输入代码或公司名，如 AAPL 或 苹果'
        : market === 'hk' ? '输入代码或公司名，如 00700 或 腾讯'
        : '输入代码或公司名称，如 600519 或 茅台';

      return (
        <div className="flex flex-col gap-2 w-full md:w-auto">
          <div className="flex items-center gap-3">
            <div className="relative w-full md:w-64">
              <input
                ref={inputRef}
                type="text"
                value={code}
                onChange={handleInput}
                onKeyDown={handleKey}
                onFocus={() => { if (suggestions.length > 0) setShowDrop(true); }}
                placeholder={placeholderText}
                className="bg-card border border-border rounded px-3 py-2 text-txt text-sm font-mono outline-none focus:border-gold w-full"
              />
              {showDrop && suggestions.length > 0 && (
                <div ref={dropRef}
                  className="absolute top-full left-0 right-0 mt-1 bg-[#1a1a2e] border border-border rounded shadow-xl z-50 max-h-72 overflow-y-auto">
                  {suggestions.map((s, i) => (
                    <div key={s.c}
                      onClick={() => { setCode(s.c); doSearch(s.c); }}
                      onMouseEnter={() => setSelIdx(i)}
                      className={`px-3 py-2 cursor-pointer flex items-center justify-between text-sm transition-colors ${
                        i === selIdx ? 'bg-gold/15 text-gold' : 'text-txt hover:bg-white/5'
                      }`}>
                      <span className="font-mono text-xs text-txt-dim mr-3">{s.c}</span>
                      <span className="flex-1 text-right truncate">{s.n}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button
              onClick={() => {
                const val = code.trim();
                if (val && stockIndex && !/^\d/.test(val)) {
                  const match = stockIndex.find(s => (s.m || 'cn') === market && s.n === val);
                  if (match) { setCode(match.c); doSearch(match.c); return; }
                }
                doSearch(val);
              }}
              disabled={loading}
              className="bg-gold/10 border border-gold text-gold px-5 py-2 rounded text-sm font-bold hover:bg-gold/20 transition disabled:opacity-50 whitespace-nowrap"
            >
              {loading ? '加载中...' : '查询'}
            </button>
          </div>
          {error && <div className="text-red-400 text-xs">{error}</div>}
          <div className="flex flex-wrap gap-1.5">
            {QUICK_STOCKS.map(([c, n]) => (
              <button key={c} onClick={() => { setCode(c); doSearch(c); }}
                className="text-[10px] px-2 py-1 rounded border border-border text-txt-dim hover:text-gold hover:border-gold/40 transition">
                {n}
              </button>
            ))}
          </div>
        </div>
      );
    };

    // ─── TabBar ─────────────────────────────────────────────────────────────
    const TABS = ['市场概览', '数据透视', '财务质量', '企业表达', '股东与分红', '横向对比'];

    const TabBar = ({ active, onChange }) => (
      <div className="flex gap-0.5 border-b border-border pb-0 overflow-x-auto scrollbar-hide">
        {TABS.map((t, i) => (
          <button
            key={i}
            onClick={() => onChange(i)}
            className={`px-3 md:px-4 py-2.5 text-xs font-bold whitespace-nowrap transition border-b-2 min-h-[44px] flex items-center ${
              active === i
                ? 'border-gold text-gold'
                : 'border-transparent text-txt-dim hover:text-txt'
            }`}
          >
            {t}
          </button>
        ))}
      </div>
    );

    // ─── Tab 1: DataOverview ────────────────────────────────────────────────
    const DataOverview = ({ data }) => {
      const { profile, quote, financial, income, balance: bal, currency } = data;
      const annuals = useMemo(() => filterAnnual(financial), [financial]);

      // For US/HK: financial[] is empty, synthesize from income + balance
      const hasFinancial = financial && financial.length > 0;
      const synthesized = useMemo(() => {
        if (!income?.length) return {};
        const inc = income[0];
        const b = bal?.[0] || {};
        return {
          totalRevenue: inc.revenue, totalRevenueYoY: inc.revenueYoY,
          netProfit: inc.parentNetProfit || inc.netProfit, netProfitYoY: inc.parentNetProfitYoY,
          grossMargin: inc.grossMargin, netMargin: inc.netMargin,
          debtRatio: b.debtRatio, reportDate: inc.reportDate, reportName: inc.reportName || inc.reportDate,
        };
      }, [income, bal]);
      const latest = hasFinancial ? financial[0] : synthesized;

      // Income trend for US/HK (when financial annuals empty)
      const incomeAnnuals = useMemo(() => {
        if (hasFinancial) return [];
        return (income || []).filter(r => r.reportType === '年报' || r.reportType === 'FY' || (r.reportName && r.reportName.includes('年报')));
      }, [income, hasFinancial]);

      return (
        <div className="space-y-4">
          {/* Company Profile */}
          <InfoCard title="公司概况">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-1 text-xs">
              <Row label="公司名称" value={profile?.name} />
              <Row label="全称" value={profile?.fullName} />
              <Row label="股票代码" value={profile?.code} />
              <Row label="行业分类" value={profile?.industry} />
              {profile?.industryCSRC && <Row label="证监会行业" value={profile?.industryCSRC} />}
              {profile?.chairman && <Row label="董事长" value={profile?.chairman} />}
              {profile?.legalPerson && <Row label="法人" value={profile?.legalPerson} />}
              {profile?.secretary && <Row label="董秘" value={profile?.secretary} />}
              {profile?.province && <Row label="省份" value={profile?.province} />}
              <Row label="证券类型" value={profile?.securityType} />
              {currency && <Row label="币种" value={currency} />}
            </div>
            {profile?.mainBusiness && (
              <div className="mt-3 text-xs text-txt-dim">
                <span className="text-gold-dark">主营业务: </span>{profile.mainBusiness}
              </div>
            )}
            {profile?.description && (
              <div className="mt-2 text-xs text-txt-dim leading-relaxed max-h-24 overflow-y-auto">
                {profile.description.trim()}
              </div>
            )}
          </InfoCard>

          {/* Real-time Quote */}
          <InfoCard title={`行情数据${quote?.fetchTime ? ' · ' + new Date(quote.fetchTime).toLocaleString('zh-CN') : ''}`}>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-4 text-xs">
              <QuoteItem label="最新价" value={quote?.price?.toFixed(2)} highlight />
              <QuoteItem label="涨跌额" value={quote?.change?.toFixed(2)} color={quote?.change >= 0 ? 'up' : 'down'} />
              <QuoteItem label="涨跌幅" value={formatPct(quote?.changePct)} color={quote?.changePct >= 0 ? 'up' : 'down'} />
              <QuoteItem label="PE(TTM)" value={quote?.pe?.toFixed(2)} />
              <QuoteItem label="PB" value={quote?.pb?.toFixed(2)} />
              <QuoteItem label="总市值" value={formatNum(quote?.totalMV, currency)} />
              <QuoteItem label="流通市值" value={formatNum(quote?.circMV, currency)} />
              <QuoteItem label="换手率" value={quote?.turnover != null ? quote.turnover + '%' : '-'} />
              <QuoteItem label="成交量" value={formatNum(quote?.volume)} />
              <QuoteItem label="成交额" value={formatNum(quote?.amount, currency)} />
            </div>
          </InfoCard>

          {/* Core Financial Indicators */}
          <InfoCard title="核心财务指标 (最新报告期)">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs mb-4">
              <IndicatorCard label="营业收入" value={formatNum(latest.totalRevenue, currency)} yoy={latest.totalRevenueYoY} />
              <IndicatorCard label="净利润" value={formatNum(latest.netProfit, currency)} yoy={latest.netProfitYoY} />
              {hasFinancial ? (
                <IndicatorCard label="扣非净利润" value={formatNum(latest.deductNetProfit, currency)} yoy={latest.deductNetProfitYoY} />
              ) : (
                <IndicatorCard label="营业利润" value={formatNum(income?.[0]?.operateProfit, currency)} />
              )}
              <IndicatorCard label="ROE(加权)" value={latest.weightedROE != null ? latest.weightedROE.toFixed(2) + '%' : '-'} />
              <IndicatorCard label="毛利率" value={latest.grossMargin != null ? latest.grossMargin.toFixed(2) + '%' : '-'} />
              <IndicatorCard label="净利率" value={latest.netMargin != null ? latest.netMargin.toFixed(2) + '%' : '-'} />
              <IndicatorCard label="资产负债率" value={latest.debtRatio != null ? latest.debtRatio.toFixed(2) + '%' : '-'} />
              <IndicatorCard label="经营现金流/收入" value={latest.cashToRevenue != null ? latest.cashToRevenue.toFixed(2) : '-'} />
            </div>
            <div className="text-[10px] text-txt-dim">报告期: {latest.reportName || latest.reportDate || '-'}</div>
          </InfoCard>

          {/* 5-Year Trend */}
          <InfoCard title="五年趋势 (年报)">
            {hasFinancial ? (
              <>
                <MetricTable
                  headers={['指标', ...annuals.slice(0, 5).map(a => a.reportDate?.slice(0, 4) || a.reportName)]}
                  rows={[
                    trendRow('营业收入(亿)', annuals, 'totalRevenue', v => (v / 1e8).toFixed(1)),
                    trendRow('收入YoY%', annuals, 'totalRevenueYoY', v => v.toFixed(2) + '%'),
                    trendRow('净利润(亿)', annuals, 'netProfit', v => (v / 1e8).toFixed(1)),
                    trendRow('净利润YoY%', annuals, 'netProfitYoY', v => v.toFixed(2) + '%'),
                    trendRow('扣非净利润(亿)', annuals, 'deductNetProfit', v => (v / 1e8).toFixed(1)),
                    trendRow('ROE%', annuals, 'weightedROE', v => v.toFixed(2) + '%'),
                    trendRow('毛利率%', annuals, 'grossMargin', v => v.toFixed(2) + '%'),
                    trendRow('净利率%', annuals, 'netMargin', v => v.toFixed(2) + '%'),
                    trendRow('负债率%', annuals, 'debtRatio', v => v.toFixed(2) + '%'),
                    trendRow('基本EPS', annuals, 'basicEPS', v => v.toFixed(2)),
                  ]}
                />
                {annuals.length >= 2 && (
                  <div className="mt-3 text-[10px] text-txt-dim">
                    收入CAGR(5年): <span className="text-gold">{calcCAGR(annuals.slice(0, 5).map(a => a.totalRevenue))?.toFixed(2) || '-'}%</span>
                    {' | '}
                    净利润CAGR(5年): <span className="text-gold">{calcCAGR(annuals.slice(0, 5).map(a => a.netProfit))?.toFixed(2) || '-'}%</span>
                  </div>
                )}
              </>
            ) : (
              <>
                <MetricTable
                  headers={['指标', ...incomeAnnuals.slice(0, 5).map(a => a.reportDate?.slice(0, 4) || a.reportName)]}
                  rows={[
                    trendRow(`营收(${currency === 'USD' ? '百万$' : '亿'})`, incomeAnnuals, 'revenue', v => currency === 'USD' ? (v / 1e6).toFixed(1) : (v / 1e8).toFixed(1)),
                    trendRow('收入YoY%', incomeAnnuals, 'revenueYoY', v => v.toFixed(2) + '%'),
                    trendRow(`净利润(${currency === 'USD' ? '百万$' : '亿'})`, incomeAnnuals, 'parentNetProfit', v => currency === 'USD' ? (v / 1e6).toFixed(1) : (v / 1e8).toFixed(1)),
                    trendRow('毛利率%', incomeAnnuals, 'grossMargin', v => v.toFixed(2) + '%'),
                    trendRow('净利率%', incomeAnnuals, 'netMargin', v => v.toFixed(2) + '%'),
                    trendRow('研发费用', incomeAnnuals, 'researchExpense', v => currency === 'USD' ? (v / 1e6).toFixed(1) + 'M' : (v / 1e8).toFixed(1) + '亿'),
                    trendRow('基本EPS', incomeAnnuals, 'basicEPS', v => v.toFixed(2)),
                  ]}
                />
                {incomeAnnuals.length >= 2 && (
                  <div className="mt-3 text-[10px] text-txt-dim">
                    收入CAGR(5年): <span className="text-gold">{calcCAGR(incomeAnnuals.slice(0, 5).map(a => a.revenue))?.toFixed(2) || '-'}%</span>
                    {' | '}
                    净利润CAGR(5年): <span className="text-gold">{calcCAGR(incomeAnnuals.slice(0, 5).map(a => a.parentNetProfit))?.toFixed(2) || '-'}%</span>
                  </div>
                )}
              </>
            )}
          </InfoCard>
        </div>
      );
    };

    const Row = ({ label, value }) => (
      <div className="flex gap-2 py-1">
        <span className="text-txt-dim w-20 shrink-0">{label}</span>
        <span className="text-txt">{value || '-'}</span>
      </div>
    );

    const QuoteItem = ({ label, value, color, highlight }) => (
      <div>
        <div className="text-txt-dim text-[10px]">{label}</div>
        <div className={`font-bold ${highlight ? 'text-lg' : 'text-sm'} ${color === 'up' ? 'text-up' : color === 'down' ? 'text-down' : 'text-txt'}`}>
          {value || '-'}
        </div>
      </div>
    );

    const IndicatorCard = ({ label, value, yoy }) => (
      <div className="bg-bg border border-border rounded p-3">
        <div className="text-txt-dim text-[10px]">{label}</div>
        <div className="text-txt font-bold text-sm mt-1">{value}</div>
        {yoy != null && (
          <div className={`text-[10px] mt-1 ${yoyColor(yoy)}`}>
            同比 {formatPct(yoy)}
          </div>
        )}
      </div>
    );

    const trendRow = (label, annuals, key, fmt) => {
      const cells = [{ v: label, cls: 'text-gold-dark font-medium' }];
      annuals.slice(0, 5).forEach(a => {
        const val = safeNum(a[key]);
        if (key.includes('YoY') && val != null) {
          cells.push({ v: val != null ? fmt(val) : '-', cls: yoyColor(val) });
        } else {
          cells.push({ v: val != null ? fmt(val) : '-' });
        }
      });
      return cells;
    };

    // ─── Tab 2: FinancialQuality ────────────────────────────────────────────
    const FinancialQuality = ({ data }) => {
      const { financial, income, balance: bal, cashflow } = data;
      const annuals = useMemo(() => filterAnnual(financial), [financial]);
      const annualIncome = useMemo(() => filterAnnual(income), [income]);
      const annualBal = useMemo(() => filterAnnual(bal), [bal]);
      const annualCash = useMemo(() => filterAnnual(cashflow), [cashflow]);
      const latest = financial?.[0] || {};
      const latestIncome = income?.[0] || {};

      return (
        <div className="space-y-4">
          {/* 扣非利润分析 */}
          <InfoCard title="扣非利润分析">
            <MetricTable
              headers={['报告期', '净利润', '扣非净利润', '非经常损益', '非经常占比', '质量评分']}
              rows={annuals.slice(0, 5).map(a => {
                const np = safeNum(a.netProfit);
                const dnp = safeNum(a.deductNetProfit);
                const nrl = safeNum(a.nonRecurringPnL);
                const ratio = safeNum(a.nonRecurringRatio);
                const quality = dnp != null && np != null && np !== 0
                  ? Math.min(100, (dnp / np * 100)).toFixed(1) + '分'
                  : '-';
                return [
                  { v: a.reportDate?.slice(0, 4) || a.reportName, cls: 'text-gold-dark' },
                  { v: np != null ? formatNum(np) : '-' },
                  { v: dnp != null ? formatNum(dnp) : '-' },
                  { v: nrl != null ? formatNum(nrl) : '-' },
                  { v: ratio != null ? ratio.toFixed(2) + '%' : '-' },
                  { v: quality, cls: 'text-gold font-bold' },
                ];
              })}
            />
          </InfoCard>

          {/* 现金流三维分析 */}
          <InfoCard title="现金流三维分析 (年报)">
            {annualCash.length === 0 ? (
              <div className="text-xs text-txt-dim leading-relaxed">
                该公司属于金融类(银行/保险/券商)，采用特殊会计准则，资产负债表和现金流量表数据暂不可用。
                金融类公司的现金流分析可参考"核心财务指标"中的经营现金流/收入比。
              </div>
            ) : (
              <>
            <MetricTable
              headers={['年度', '经营现金流', '投资现金流', '筹资现金流', '自由现金流(估算)', '经营/收入比']}
              rows={annualCash.slice(0, 5).map(c => {
                const opCash = safeNum(c.netOperatingCash);
                const invCash = safeNum(c.netInvestCash);
                const finCash = safeNum(c.netFinanceCash);
                const salesCash = safeNum(c.salesCash);
                const rev = annuals.find(a => a.reportDate === c.reportDate)?.totalRevenue;
                const fcf = opCash != null && invCash != null ? opCash + invCash : null;
                const opRevRatio = opCash != null && rev ? (opCash / rev * 100).toFixed(1) + '%' : '-';
                return [
                  { v: c.reportDate?.slice(0, 4), cls: 'text-gold-dark' },
                  { v: opCash != null ? formatNum(opCash) : '-', cls: opCash > 0 ? 'text-up' : 'text-down' },
                  { v: invCash != null ? formatNum(invCash) : '-' },
                  { v: finCash != null ? formatNum(finCash) : '-' },
                  { v: fcf != null ? formatNum(fcf) : '-', cls: fcf > 0 ? 'text-up' : fcf < 0 ? 'text-down' : '' },
                  { v: opRevRatio },
                ];
              })}
            />
            <div className="mt-2 text-[10px] text-txt-dim">
              自由现金流(估算) = 经营现金流 + 投资现金流 (因缺少资本开支明细，此为粗估)
            </div>
              </>
            )}
          </InfoCard>

          {/* 资产负债健康度 */}
          <InfoCard title="资产负债健康度">
            {annualBal.length === 0 ? (
              <div className="text-xs text-txt-dim leading-relaxed">
                该公司属于金融类(银行/保险/券商)，采用特殊资产负债表格式，常规资产负债数据暂不可用。
                可关注"核心财务指标"中的资产负债率和ROE等综合指标。
              </div>
            ) : (
              <>
            <MetricTable
              headers={['年度', '资产负债率', '流动比率', '速动比率', '总资产', '总负债', '商誉/总资产']}
              rows={annualBal.slice(0, 5).map(b => {
                const goodwill = safeNum(b.goodwill);
                const ta = safeNum(b.totalAssets);
                const goodwillRatio = goodwill != null && ta ? (goodwill / ta * 100).toFixed(2) + '%' : '无商誉';
                return [
                  { v: b.reportDate?.slice(0, 4), cls: 'text-gold-dark' },
                  { v: safeNum(b.debtRatio) != null ? b.debtRatio.toFixed(2) + '%' : '-' },
                  { v: safeNum(b.currentRatio) != null ? b.currentRatio.toFixed(2) : '-' },
                  { v: safeNum(b.equityMultiplier) != null ? b.equityMultiplier.toFixed(2) : '-' },
                  { v: ta != null ? formatNum(ta) : '-' },
                  { v: safeNum(b.totalLiabilities) != null ? formatNum(b.totalLiabilities) : '-' },
                  { v: goodwillRatio, cls: goodwill != null && ta && goodwill / ta > 0.1 ? 'text-up font-bold' : '' },
                ];
              })}
            />
              </>
            )}
          </InfoCard>

          {/* 费用率分析 */}
          <InfoCard title="费用率分析 (最新)">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs mb-3">
              <ExpCard label="销售费用率" value={latestIncome.saleExpenseRatio} amount={latestIncome.saleExpense} />
              <ExpCard label="管理费用率" value={latestIncome.manageExpenseRatio} amount={latestIncome.manageExpense} />
              <ExpCard label="研发费用率" value={latestIncome.researchRatio} amount={latestIncome.researchExpense} />
              <ExpCard label="财务费用率" value={latestIncome.financeExpenseRatio} amount={latestIncome.financeExpense} />
            </div>
            <MetricTable
              headers={['报告期', '销售费用率', '管理费用率', '研发费用率', '财务费用率', '总费用率']}
              rows={annualIncome.slice(0, 5).map(inc => {
                const total = [inc.saleExpenseRatio, inc.manageExpenseRatio, inc.researchRatio, inc.financeExpenseRatio]
                  .filter(v => v != null).reduce((s, v) => s + v, 0);
                return [
                  { v: inc.reportDate?.slice(0, 4) || inc.reportName, cls: 'text-gold-dark' },
                  { v: safeNum(inc.saleExpenseRatio) != null ? inc.saleExpenseRatio.toFixed(2) + '%' : '-' },
                  { v: safeNum(inc.manageExpenseRatio) != null ? inc.manageExpenseRatio.toFixed(2) + '%' : '-' },
                  { v: safeNum(inc.researchRatio) != null ? inc.researchRatio.toFixed(2) + '%' : '-' },
                  { v: safeNum(inc.financeExpenseRatio) != null ? inc.financeExpenseRatio.toFixed(2) + '%' : '-' },
                  { v: total ? total.toFixed(2) + '%' : '-', cls: 'text-gold font-bold' },
                ];
              })}
            />
          </InfoCard>
        </div>
      );
    };

    const ExpCard = ({ label, value, amount }) => (
      <div className="bg-bg border border-border rounded p-3">
        <div className="text-txt-dim text-[10px]">{label}</div>
        <div className="text-txt font-bold text-sm mt-1">
          {value != null ? value.toFixed(2) + '%' : '-'}
        </div>
        <div className="text-txt-dim text-[10px] mt-1">
          {amount != null ? formatNum(amount) : '-'}
        </div>
      </div>
    );

    // ─── Tab 3: ManagementExpr ──────────────────────────────────────────────
    const SECTION_MAP = {
      shareholderLetter: '致股东信',
      mdna:              '管理层讨论与分析',
      relatedParty:      '关联交易',
      top10Holders:      '前十大股东',
      dividend:          '分红方案',
      segment:           '分部信息',
      nonRecurring:      '非经常性损益',
    };
    const LABEL_COLOR = {
      '利好': 'green', '利空': 'red', '增量': 'blue',
      '新技术': 'purple', '海外': 'orange', '国内': 'blue',
    };
    const cleanPreview = (text, maxLen = 200) => {
      const t = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').replace(/□适用\s*√不适用/g, '').replace(/√适用\s*□不适用/g, '').trim();
      return t.length > maxLen ? t.slice(0, maxLen) + '...' : t;
    };
    const SectionCard = ({ title, text }) => {
      const [expanded, setExpanded] = useState(false);
      const preview = cleanPreview(text);
      return (
        <InfoCard title={title}>
          <p className="text-xs text-txt leading-relaxed whitespace-pre-wrap" style={{
            maxHeight: expanded ? 'none' : '7em', overflow: 'hidden', position: 'relative',
          }}>
            {expanded ? text : preview}
          </p>
          {text.length > 200 && (
            <button onClick={() => setExpanded(!expanded)}
              className="text-gold text-[10px] mt-2 hover:underline">
              {expanded ? '收起' : '展开全文'}
            </button>
          )}
        </InfoCard>
      );
    };

    const OverseasTextBlock = ({ paragraphs }) => {
      const [showAll, setShowAll] = useState(false);
      const visible = showAll ? paragraphs : paragraphs.slice(0, 5);
      return (
        <div className="space-y-2">
          {visible.map((p, i) => (
            <div key={i} className="border-l-2 border-cyan-700 pl-3 py-1">
              <p className="text-[11px] text-txt leading-relaxed">{p}</p>
            </div>
          ))}
          {paragraphs.length > 5 && (
            <button onClick={() => setShowAll(!showAll)}
              className="text-cyan-500 text-[10px] hover:underline">
              {showAll ? '收起' : `展开全部 ${paragraphs.length} 条`}
            </button>
          )}
        </div>
      );
    };
    const FullTextToggle = ({ text, label }) => {
      const [open, setOpen] = useState(false);
      return (
        <div className="mt-3">
          <button onClick={() => setOpen(!open)}
            className="text-cyan-500 text-[10px] hover:underline">
            {open ? '收起' : `查看${label}`}
          </button>
          {open && (
            <div className="mt-2 border border-border rounded p-3 max-h-96 overflow-y-auto">
              <p className="text-[11px] text-txt leading-relaxed whitespace-pre-wrap">{text}</p>
            </div>
          )}
        </div>
      );
    };

    // ─── Risk Alert Module ──────────────────────────────────────────────────
    const RISK_CATEGORIES = {
      operate: { label: '经营风险', color: 'red', keywords: [
        '风险','挑战','困难','不确定','压力','下降','下滑','萎缩','竞争加剧','市场份额',
        '市场地位','盈利能力','持续增长','经营业绩','行业竞争','行业周期'] },
      finance: { label: '财务风险', color: 'red', keywords: [
        '负债','偿债','流动性','资金链','应收账款','坏账','减值','商誉减值','亏损',
        '资金紧张','融资困难','利息','逾期','担保','质押','现金流'] },
      policy: { label: '政策与合规风险', color: 'orange', keywords: [
        '监管','政策变化','合规','处罚','诉讼','仲裁','调查','违规','整改',
        '行业政策','税收政策','贸易政策','反垄断','数据安全','知识产权'] },
      market: { label: '市场风险', color: 'orange', keywords: [
        '需求不足','产能过剩','价格战','原材料','涨价','汇率波动','贸易摩擦',
        '关税','制裁','供应链','客户集中','大客户','依赖','替代品'] },
      safety: { label: '安全与环保风险', color: 'purple', keywords: [
        '安全事故','环保','排放','质量','召回','污染','能耗','碳排放','双碳',
        '安全生产','职业健康','自然灾害','疫情','不可抗力'] },
    };
    const RISK_CAT_LABELS = { 'red': '高风险', 'orange': '中风险', 'purple': '低风险' };

    const splitSentences = (text) => {
      if (!text) return [];
      return text.split(/(?<=[。；;!！\n])/)
        .map(s => s.replace(/[\s\n]+/g, ' ').trim())
        .filter(s => s.length > 8 && s.length < 300);
    };

    const extractRisks = (texts, category) => {
      const kws = category.keywords;
      const seen = new Set();
      const results = [];
      for (const text of texts) {
        if (!text) continue;
        const sentences = splitSentences(text);
        for (const s of sentences) {
          const hit = kws.some(kw => s.includes(kw));
          if (hit) {
            const key = s.slice(0, 40);
            if (!seen.has(key)) {
              seen.add(key);
              // Highlight matched keywords
              const matchedKws = kws.filter(kw => s.includes(kw));
              results.push({ text: s, matched: matchedKws });
            }
          }
        }
      }
      return results.slice(0, 10);
    };

    const extractFinancialRisks = (financial, balance) => {
      const signals = [];
      const latestFin = financial?.[0];
      const latestBal = balance?.[0];
      if (latestBal) {
        if (latestBal.debtRatio > 70) signals.push({ label: '高负债', detail: `资产负债率 ${(latestBal.debtRatio).toFixed(1)}%`, level: 'red' });
        else if (latestBal.debtRatio > 55) signals.push({ label: '负债偏高', detail: `资产负债率 ${(latestBal.debtRatio).toFixed(1)}%`, level: 'orange' });
        if (latestBal.goodwill && latestBal.totalAssets) {
          const goodwillRatio = (latestBal.goodwill / latestBal.totalAssets * 100);
          if (goodwillRatio > 10) signals.push({ label: '商誉占比较高', detail: `商誉/总资产 ${goodwillRatio.toFixed(1)}%`, level: 'red' });
          else if (goodwillRatio > 5) signals.push({ label: '商誉占比偏高', detail: `商誉/总资产 ${goodwillRatio.toFixed(1)}%`, level: 'orange' });
        }
        if (latestBal.currentRatio != null && latestBal.currentRatio < 1) signals.push({ label: '短期偿债压力', detail: `流动比率 ${latestBal.currentRatio.toFixed(2)}`, level: 'red' });
      }
      if (latestFin) {
        if (latestFin.netMargin != null && latestFin.netMargin < 0) signals.push({ label: '亏损', detail: `净利率 ${latestFin.netMargin.toFixed(1)}%`, level: 'red' });
        if (latestFin.deductNetProfit != null && latestFin.netProfit != null && latestFin.deductNetProfit < 0 && latestFin.netProfit > 0)
          signals.push({ label: '扣非亏损', detail: '扣非净利润为负，主业盈利能力不足', level: 'red' });
        if (latestFin.cashToRevenue != null && latestFin.cashToRevenue < 50) signals.push({ label: '回款质量差', detail: `现金收入比 ${latestFin.cashToRevenue.toFixed(1)}%`, level: 'orange' });
        if (latestFin.weightedROE != null && latestFin.weightedROE < 5) signals.push({ label: 'ROE偏低', detail: `加权ROE ${latestFin.weightedROE.toFixed(1)}%`, level: 'orange' });
      }
      return signals;
    };

    const RiskItem = ({ text, matched }) => {
      const highlighted = matched.reduce((acc, kw) => {
        return acc.split(kw).join(`\x00${kw}\x00`);
      }, text);
      const parts = highlighted.split('\x00').filter(Boolean);
      return (
        <div className="border-l-2 border-red-700 pl-3 py-1.5">
          <p className="text-[11px] text-txt leading-relaxed">
            {parts.map((p, i) =>
              matched.includes(p)
                ? <span key={i} className="text-red-400 font-medium">{p}</span>
                : <span key={i}>{p}</span>
            )}
          </p>
        </div>
      );
    };

    const RiskAlert = ({ data }) => {
      const { financial, income, balance: bal, cninfo, overseas } = data || {};
      const latestAnalysis = (overseas?.analysis || [])[0] || null;
      const textSources = [
        latestAnalysis?.businessReview || '',
        latestAnalysis?.futureExpect || '',
        cninfo?.sections?.mdna || '',
      ].filter(Boolean);

      // Extract tagged "利空" paragraphs
      const bearishParas = (cninfo?.taggedParagraphs || [])
        .filter(p => p.labels?.includes('利空'))
        .map(p => p.text);
      if (bearishParas.length > 0) textSources.push(bearishParas.join('。'));

      // Extract risks by category
      const categoryRisks = Object.entries(RISK_CATEGORIES).map(([key, cat]) => ({
        key, ...cat,
        items: extractRisks(textSources, cat),
      })).filter(c => c.items.length > 0);

      // Financial risk signals
      const finSignals = extractFinancialRisks(financial, bal);
      const hasAnyRisk = categoryRisks.length > 0 || finSignals.length > 0;

      const [expandedCat, setExpandedCat] = useState(null);
      const toggleCat = (key) => setExpandedCat(expandedCat === key ? null : key);

      return (
        <InfoCard title="风险预警" className="border-red-900/50">
          {!hasAnyRisk ? (
            <div className="text-center py-4">
              <p className="text-xs text-txt-dim">未检测到显著经营风险信号</p>
            </div>
          ) : (
            <div className="space-y-3">
              {/* Financial risk signals */}
              {finSignals.length > 0 && (
                <div>
                  <div className="text-[10px] text-txt-dim mb-1.5">财务风险信号</div>
                  <div className="flex flex-wrap gap-1.5">
                    {finSignals.map((s, i) => (
                      <div key={i} className={`px-2 py-1 rounded text-[10px] ${
                        s.level === 'red' ? 'bg-red-900/40 text-red-300' : 'bg-yellow-900/40 text-yellow-300'
                      }`}>
                        <span className="font-medium">{s.label}</span>
                        <span className="text-txt-dim ml-1">{s.detail}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Text-based risk categories */}
              {categoryRisks.map((cat) => (
                <div key={cat.key} className="border border-border rounded">
                  <button
                    onClick={() => toggleCat(cat.key)}
                    className="w-full flex items-center justify-between px-3 py-2 text-left hover:bg-bg-hover transition-colors"
                  >
                    <div className="flex items-center gap-2">
                      <span className={`w-2 h-2 rounded-full ${
                        cat.color === 'red' ? 'bg-red-500' : cat.color === 'orange' ? 'bg-orange-500' : 'bg-purple-500'
                      }`} />
                      <span className="text-xs text-txt font-medium">{cat.label}</span>
                      <span className="text-[10px] text-txt-dim bg-bg-light px-1.5 py-0.5 rounded">
                        {cat.items.length} 条
                      </span>
                    </div>
                    <span className="text-txt-dim text-[10px]">{expandedCat === cat.key ? '▲' : '▼'}</span>
                  </button>
                  {expandedCat === cat.key && (
                    <div className="px-3 pb-3 space-y-2">
                      {cat.items.map((item, i) => (
                        <RiskItem key={i} text={item.text} matched={item.matched} />
                      ))}
                    </div>
                  )}
                </div>
              ))}

              <div className="text-[10px] text-txt-dim pt-1 border-t border-border">
                来源: 财报经营分析文本 · 财务指标自动检测 · 仅供参考，不构成投资建议
              </div>
            </div>
          )}
        </InfoCard>
      );
    };

    const ManagementExpr = ({ data }) => {
      const cninfo = data?.cninfo;
      const overseas = data?.overseas;
      const hasCninfo = !!cninfo;
      const hasOverseas = !!overseas && (
        (overseas.segments && overseas.segments.length > 0) ||
        (overseas.analysis && overseas.analysis.length > 0)
      );

      // Overseas keyword extraction
      const OVERSEAS_KW = ['海外','境外','出口','国际市场','国际业务','全球化','出海',
        '外贸','跨国','欧洲','北美','东南亚','中东','非洲','拉美','亚太','一带一路',
        '关税','贸易壁垒','汇率','外币','外汇','境外子','境外经营','国际化'];
      const extractOverseasText = (text) => {
        if (!text) return [];
        const sentences = text.split(/(?<=[。；;！\n])/).map(s => s.trim()).filter(Boolean);
        return sentences.filter(s => OVERSEAS_KW.some(kw => s.includes(kw))).slice(0, 20);
      };
      const fmtYi = (v) => v != null ? `${(v / 1e8).toFixed(1)}亿` : '-';
      const fmtPct = (v) => v != null ? `${v.toFixed(2)}%` : '-';

      // Build overseas trend rows from segments (byRegion, only annual reports)
      const segments = (overseas?.segments || []).sort((a, b) => a.reportDate.localeCompare(b.reportDate));
      const trendRows = segments.map((seg, i) => {
        const regions = seg.byRegion || [];
        const overseasItem = regions.find(r => /海外|境外|国际|国外/.test(r.name));
        const domesticItem = regions.find(r => /国内|境内|中国/.test(r.name));
        const overseasInc = overseasItem?.income || null;
        const prevSeg = i > 0 ? segments[i - 1] : null;
        const prevOverseas = prevSeg?.byRegion?.find(r => /海外|境外|国际|国外/.test(r.name));
        const yoy = (overseasInc && prevOverseas?.income)
          ? ((overseasInc / prevOverseas.income - 1) * 100) : null;
        return [
          { v: seg.reportDate?.slice(0, 10) || '-', cls: 'text-gold-dark' },
          { v: fmtYi(overseasInc), cls: overseasInc ? 'text-cyan-400' : 'text-txt-dim' },
          { v: fmtPct(overseasItem?.incomeRatio) },
          { v: fmtPct(overseasItem?.grossMargin) },
          { v: fmtPct(domesticItem?.grossMargin) },
          { v: yoy != null ? `${yoy > 0 ? '+' : ''}${yoy.toFixed(1)}%` : '-',
            cls: yoy != null ? (yoy > 0 ? 'text-red-400' : 'text-green-400') : 'text-txt-dim' },
        ];
      });

      // Latest segment for region/product breakdown
      const latestSeg = segments[segments.length - 1] || null;
      const regionRows = (latestSeg?.byRegion || [])
        .filter(r => !/补充|其他\(补充\)/.test(r.name))
        .map(r => [
          { v: r.name, cls: 'text-cyan-400' },
          { v: fmtYi(r.income) },
          { v: fmtPct(r.incomeRatio) },
          { v: fmtPct(r.grossMargin) },
        ]);
      const productRows = (latestSeg?.byProduct || [])
        .filter(r => !/补充|其他\(补充\)/.test(r.name))
        .map(r => [
          { v: r.name, cls: 'text-cyan-400' },
          { v: fmtYi(r.income) },
          { v: fmtPct(r.incomeRatio) },
          { v: fmtPct(r.grossMargin) },
        ]);

      // Latest analysis for management discussion
      const latestAnalysis = (overseas?.analysis || [])[0] || null;
      const overseasReviewParas = extractOverseasText(latestAnalysis?.businessReview || '');
      const overseasFutureParas = extractOverseasText(latestAnalysis?.futureExpect || '');
      const fullFutureText = latestAnalysis?.futureExpect || '';

      if (!hasCninfo && !hasOverseas) {
        const isGlobal = data?.market === 'us' || data?.market === 'hk';
        return (
          <div className="space-y-4">
            <RiskAlert data={data} />
            <InfoCard title="企业表达分析">
              <p className="text-xs text-txt-dim leading-relaxed">
                {isGlobal
                  ? '该板块目前仅支持 A 股公司（依赖年报原文分析与出海营收数据）。' + (data?.market === 'us' ? '美股公司的业务分析可参考利润表与资产负债表的地区构成。' : '港股公司的业务分析可参考利润表与资产负债表的地区构成。')
                  : <>该股票的企业表达数据尚未生成。
                    <br/>年报原文: 运行 <code className="text-gold">python etl/fetch_cninfo.py {data?.code || '代码'}</code>
                    <br/>出海分析: 运行 <code className="text-gold">python etl/fetch_overseas.py {data?.code || '代码'}</code>
                  </>
                }
              </p>
            </InfoCard>
          </div>
        );
      }

      return (
        <div className="space-y-4">
          {/* ── 风险预警 ── */}
          <RiskAlert data={data} />

          {/* ── 出海分析板块 ── */}
          {hasOverseas && (
            <>
              {/* 海外营收趋势 */}
              <InfoCard title="出海分析 · 海外营收趋势" className="border-cyan-800">
                {trendRows.length > 0 ? (
                  <>
                    <div className="text-[10px] text-txt-dim mb-2">
                      数据来源: 东财主营构成（按地区分拆）· 年报 · 最近5期
                    </div>
                    <MetricTable
                      headers={['报告期', '海外收入', '占比', '海外毛利率', '国内毛利率', '海外收入YoY']}
                      rows={trendRows}
                    />
                  </>
                ) : (
                  <p className="text-[10px] text-txt-dim">暂无海外营收分地区数据</p>
                )}
              </InfoCard>

              {/* 地区构成 + 产品构成 */}
              {latestSeg && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <InfoCard title={`地区构成 · ${latestSeg.reportDate?.slice(0, 10) || ''}`} className="border-cyan-800">
                    {regionRows.length > 0 ? (
                      <MetricTable
                        headers={['地区', '收入', '占比', '毛利率']}
                        rows={regionRows}
                      />
                    ) : <p className="text-[10px] text-txt-dim">暂无</p>}
                  </InfoCard>
                  <InfoCard title={`产品构成 · ${latestSeg.reportDate?.slice(0, 10) || ''}`} className="border-cyan-800">
                    {productRows.length > 0 ? (
                      <MetricTable
                        headers={['产品', '收入', '占比', '毛利率']}
                        rows={productRows}
                      />
                    ) : <p className="text-[10px] text-txt-dim">暂无</p>}
                  </InfoCard>
                </div>
              )}

              {/* 管理层海外讨论摘要 */}
              {overseasReviewParas.length > 0 && (
                <InfoCard title={`管理层海外讨论 · ${latestAnalysis?.reportDate?.slice(0, 10) || ''}`} className="border-cyan-800">
                  <div className="text-[10px] text-txt-dim mb-2">
                    从经营分析报告中提取的海外/国际业务相关段落（共 {overseasReviewParas.length} 条）
                  </div>
                  <OverseasTextBlock paragraphs={overseasReviewParas} />
                </InfoCard>
              )}

              {/* 出海策略展望 */}
              {(overseasFutureParas.length > 0 || fullFutureText) && (
                <InfoCard title="出海策略与未来展望" className="border-cyan-800">
                  {overseasFutureParas.length > 0 ? (
                    <>
                      <div className="text-[10px] text-txt-dim mb-2">
                        从未来展望中提取的海外相关段落（共 {overseasFutureParas.length} 条）
                      </div>
                      <OverseasTextBlock paragraphs={overseasFutureParas} />
                    </>
                  ) : (
                    <p className="text-[10px] text-txt-dim">未来展望中未检测到明确的海外业务相关内容</p>
                  )}
                  {fullFutureText && (
                    <FullTextToggle text={fullFutureText} label="完整展望文本" />
                  )}
                </InfoCard>
              )}
            </>
          )}

          {/* ── 年报原文板块 (cninfo) ── */}
          {hasCninfo && (
            <>
              <InfoCard title="年报原文分析">
                <p className="text-[10px] text-txt-dim mb-3">
                  来源: {cninfo.announcementTitle || '年度报告'}
                  {cninfo.announcementDate && ` (${cninfo.announcementDate})`}
                  {cninfo.pdfUrl && <a href={cninfo.pdfUrl} target="_blank" rel="noreferrer" className="text-gold ml-2 hover:underline">[PDF原文]</a>}
                </p>
                <div className="flex gap-2 flex-wrap mb-2">
                  {Object.entries(LABEL_COLOR).map(([l, c]) => <Badge key={l} text={l} color={c} />)}
                  <span className="text-[10px] text-txt-dim ml-2">语义标签</span>
                </div>
                <div className="text-[10px] text-txt-dim">
                  已提取 {Object.entries(SECTION_MAP).filter(([k]) => cninfo.sections?.[k]?.trim()).length} 个章节 / {(cninfo.taggedParagraphs || []).length} 个标注段落
                </div>
              </InfoCard>

              {(cninfo.taggedParagraphs || []).length > 0 && (
                <InfoCard title="标注段落摘录">
                  <div className="space-y-3">
                    {cninfo.taggedParagraphs.map((p, i) => (
                      <div key={i} className="border border-border rounded p-3">
                        <div className="flex gap-1 mb-2 flex-wrap">
                          {p.labels.map((l, j) => <Badge key={j} text={l} color={LABEL_COLOR[l] || 'blue'} />)}
                          {p.isOverseas && <Badge text="海外" color="orange" />}
                        </div>
                        <p className="text-[11px] text-txt leading-relaxed" style={{
                          maxHeight: '6em', overflow: 'hidden', whiteSpace: 'pre-wrap',
                        }}>
                          {p.text}
                        </p>
                      </div>
                    ))}
                  </div>
                </InfoCard>
              )}

              {Object.entries(SECTION_MAP).filter(([k]) => cninfo.sections?.[k]?.trim()).map(([key, label]) => (
                <SectionCard key={key} title={label} text={cninfo.sections[key]} />
              ))}
            </>
          )}

          {/* 仅有 cninfo 但无出海数据时的提示 */}
          {hasCninfo && !hasOverseas && (
            <InfoCard title="出海分析">
              <p className="text-xs text-txt-dim leading-relaxed">
                该公司暂无出海/海外市场数据。可能原因: 主营市场集中在国内、数据未覆盖。
              </p>
            </InfoCard>
          )}
        </div>
      );
    };

    // ─── Tab 4: ShareholderDividend ─────────────────────────────────────────
    const ShareholderDividend = ({ data }) => {
      const sh = data.shareholder || {};
      const { top10Holders, top10CircHolders, holderCountHistory, institutionalHoldings, fundHoldings, dividends } = sh;

      return (
        <div className="space-y-4">
          {/* 十大股东 */}
          <InfoCard title="十大股东">
            {top10Holders && top10Holders.length > 0 ? (
              <>
                <div className="text-[10px] text-txt-dim mb-2">截止: {top10Holders[0]?.endDate || '-'}</div>
                <MetricTable
                  headers={['序号', '股东名称', '持股类型', '持股数', '占比%', '变动']}
                  rows={top10Holders.map(h => [
                    { v: h.rank, cls: 'text-gold-dark' },
                    { v: h.name, cls: 'text-txt' },
                    { v: h.sharesType || '-' },
                    { v: formatNum(h.shares) },
                    { v: h.sharesRatio != null ? h.sharesRatio.toFixed(2) + '%' : '-' },
                    { v: h.change || '-', cls: h.change === '增加' ? 'text-up' : h.change === '减少' ? 'text-down' : '' },
                  ])}
                />
              </>
            ) : <div className="text-xs text-txt-dim">暂无数据</div>}
          </InfoCard>

          {/* 十大流通股东 */}
          <InfoCard title="十大流通股东">
            {top10CircHolders && top10CircHolders.length > 0 ? (
              <>
                <div className="text-[10px] text-txt-dim mb-2">截止: {top10CircHolders[0]?.endDate || '-'}</div>
                <MetricTable
                  headers={['序号', '股东名称', '类型', '持股数', '占比%', '变动']}
                  rows={top10CircHolders.map(h => [
                    { v: h.rank, cls: 'text-gold-dark' },
                    { v: h.name, cls: 'text-txt' },
                    { v: h.type || h.sharesType || '-' },
                    { v: formatNum(h.shares) },
                    { v: h.sharesRatio != null ? h.sharesRatio.toFixed(2) + '%' : '-' },
                    { v: h.change || '-', cls: h.change === '增加' ? 'text-up' : h.change === '减少' ? 'text-down' : '' },
                  ])}
                />
              </>
            ) : <div className="text-xs text-txt-dim">暂无数据</div>}
          </InfoCard>

          {/* 股东户数历史 */}
          <InfoCard title="股东户数历史">
            {holderCountHistory && holderCountHistory.length > 0 ? (
              <MetricTable
                headers={['日期', '户数', '变动%', '户均持股', '户均市值', '集中度']}
                rows={holderCountHistory.map(h => [
                  { v: h.endDate, cls: 'text-gold-dark' },
                  { v: h.count != null ? h.count.toLocaleString() : '-' },
                  { v: h.changeRatio != null ? formatPct(h.changeRatio) : '-', cls: yoyColor(h.changeRatio) },
                  { v: h.avgShares != null ? h.avgShares.toLocaleString() : '-' },
                  { v: h.avgHoldAmount != null ? formatNum(h.avgHoldAmount) : '-' },
                  { v: h.holdFocus || '-' },
                ])}
              />
            ) : <div className="text-xs text-txt-dim">暂无数据</div>}
          </InfoCard>

          {/* 机构持仓 */}
          <InfoCard title="机构持仓">
            {institutionalHoldings && institutionalHoldings.length > 0 ? (
              <MetricTable
                headers={['报告期', '机构总数', '持股总数', '占总股本%']}
                rows={institutionalHoldings.map(h => [
                  { v: h.reportDate, cls: 'text-gold-dark' },
                  { v: h.totalOrgs != null ? h.totalOrgs.toLocaleString() : '-' },
                  { v: formatNum(h.totalShares) },
                  { v: h.totalRatio != null ? h.totalRatio.toFixed(2) + '%' : '-' },
                ])}
              />
            ) : <div className="text-xs text-txt-dim">暂无数据</div>}
          </InfoCard>

          {/* 基金持仓 */}
          <InfoCard title="基金持仓 (Top 10)">
            {fundHoldings && fundHoldings.length > 0 ? (
              <>
                <div className="text-[10px] text-txt-dim mb-2">报告期: {fundHoldings[0]?.reportDate || '-'}</div>
                <MetricTable
                  headers={['基金代码', '基金名称', '持股数', '持仓市值', '占流通股%', '占基金净值%']}
                  rows={fundHoldings.map(h => [
                    { v: h.fundCode, cls: 'text-gold-dark' },
                    { v: h.fundName, cls: 'text-txt' },
                    { v: formatNum(h.shares) },
                    { v: formatNum(h.value) },
                    { v: h.ratio != null ? h.ratio.toFixed(4) + '%' : '-' },
                    { v: h.navRatio != null ? h.navRatio.toFixed(2) + '%' : '-' },
                  ])}
                />
              </>
            ) : <div className="text-xs text-txt-dim">暂无数据</div>}
          </InfoCard>

          {/* 分红记录 */}
          <InfoCard title="分红记录">
            {dividends && dividends.length > 0 ? (
              <MetricTable
                headers={['报告期', '每10股红利(元)', '送股比例', '转增比例', '状态', '公告日']}
                rows={dividends.map(d => [
                  { v: d.reportDate?.slice(0, 10) || '-', cls: 'text-gold-dark' },
                  { v: d.bonusPer10 != null ? Number(d.bonusPer10).toFixed(2) : '-' },
                  { v: d.stockBonusPer10 != null ? Number(d.stockBonusPer10).toFixed(2) : '-' },
                  { v: d.convertPer10 != null ? Number(d.convertPer10).toFixed(2) : '-' },
                  { v: d.status || '-' },
                  { v: (d.noticeDate || '').slice(0, 10) || '-', cls: 'text-txt-dim' },
                ])}
              />
            ) : (
              <div className="text-xs text-txt-dim">
                暂无分红数据。
              </div>
            )}
          </InfoCard>
        </div>
      );
    };

    // ─── Tab 5: IndustryCompare ─────────────────────────────────────────────
    const IndustryCompare = ({ data }) => {
      const peers = data?.industryPeers;
      const profile = data?.profile;
      const quote = data?.quote;

      if (!peers) {
        return (
          <div className="space-y-4">
            <InfoCard title="同行业对比">
              <p className="text-xs text-txt-dim leading-relaxed">
                该股票的行业对比数据尚未生成。请先运行 <code className="text-gold">python etl/fetch_industry.py</code> 抓取行业数据。
              </p>
            </InfoCard>
            <InfoCard title="当前公司行业信息">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-1 text-xs">
                <Row label="公司名称" value={profile?.name} />
                <Row label="行业分类" value={profile?.industry} />
                <Row label="证监会行业" value={profile?.industryCSRC} />
                <Row label="当前PE" value={quote?.pe?.toFixed(2)} />
                <Row label="当前PB" value={quote?.pb?.toFixed(2)} />
                <Row label="总市值" value={formatNum(quote?.totalMV)} />
              </div>
            </InfoCard>
          </div>
        );
      }

      const peerList = peers.peers || [];
      const fmtEps = v => v != null ? v.toFixed(2) : '-';
      const fmtRoe = v => v != null ? v.toFixed(2) + '%' : '-';
      const fmtNpm = v => v != null ? v.toFixed(1) + '%' : '-';
      const fmtRev = v => v != null ? formatNum(v) : '-';

      const headers = ['公司', 'EPS', 'ROE', '净利率', '营收', '净利润', '报告日期'];
      const rows = peerList.map(p => [
        { v: p.isCurrent ? `${p.name} *` : p.name, cls: p.isCurrent ? 'text-gold font-bold' : '' },
        { v: fmtEps(p.eps), cls: p.eps >= 0 ? '' : 'text-down' },
        { v: fmtRoe(p.roe), cls: p.roe > 15 ? 'text-up font-bold' : p.roe < 5 ? 'text-down' : '' },
        { v: fmtNpm(p.netProfitMargin), cls: p.netProfitMargin > 20 ? 'text-up' : '' },
        { v: fmtRev(p.revenue) },
        { v: fmtRev(p.netProfit) },
        { v: p.reportDate || '-', cls: 'text-txt-dim' },
      ]);

      return (
        <div className="space-y-4">
          <InfoCard title="同行业对比">
            <div className="flex items-center gap-4 mb-3 flex-wrap">
              <span className="text-sm text-gold font-bold">{peers.industry}</span>
              <span className="text-[10px] text-txt-dim">共 {peers.peerCount} 家公司</span>
              <span className="text-[10px] text-txt-dim">按营收降序排列</span>
            </div>
            <div className="text-[10px] text-txt-dim mb-2">
              * 标记为当前查看的公司。数据来源于东方财富，取最新一期报告。
            </div>
          </InfoCard>

          <MetricTable headers={headers} rows={rows} />

          <InfoCard title="当前公司行业信息">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-1 text-xs">
              <Row label="公司名称" value={profile?.name} />
              <Row label="行业分类" value={profile?.industry} />
              <Row label="证监会行业" value={profile?.industryCSRC} />
              <Row label="当前PE" value={quote?.pe?.toFixed(2)} />
              <Row label="当前PB" value={quote?.pb?.toFixed(2)} />
              <Row label="总市值" value={formatNum(quote?.totalMV)} />
            </div>
          </InfoCard>
        </div>
      );
    };

    // ─── Tab 0: MarketOverview (市场概览) ──────────────────────────────────
    const MARKET_COLORS = ['#d4af37','#4fc3f7','#e74c3c','#27ae60','#9b59b6','#f39c12','#1abc9c','#e67e22'];
    const PERIOD_LABELS = { annual: '年报', interim: '中报', q3: '三季报', q1: '一季报' };
    const DIM_LABELS = { board: '板块', csrc: '证监会行业', shenwan: '申万一级' };

    const MarketOverview = ({ onStockClick, market = 'cn' }) => {
      const [data, setData] = useState(null);
      const [dim, setDim] = useState('board');
      const [periodType, setPeriodType] = useState('annual');
      const [selectedPeriod, setSelectedPeriod] = useState(null);
      const [sortKey, setSortKey] = useState('overseasRev');
      const [sortAsc, setSortAsc] = useState(false);
      const [lbSortKey, setLbSortKey] = useState(null);
      const [lbSortAsc, setLbSortAsc] = useState(false);
      const chartRef = React.useRef(null);
      const chartInst = React.useRef(null);

      useEffect(() => {
        fetch(`${DATA_BASE}/market_overview.json?v=2`)
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) setData(d); })
          .catch(() => {});
      }, []);

      // Auto-select latest period
      useEffect(() => {
        if (!data) return;
        const pd = data[periodType];
        if (!pd) { setSelectedPeriod(null); return; }
        const dates = Object.keys(pd).filter(k => !k.startsWith('_')).sort().reverse();
        if (dates.length && (!selectedPeriod || !pd[selectedPeriod])) {
          setSelectedPeriod(dates[0]);
        }
      }, [data, periodType]);

      // Period data
      const periodData = useMemo(() => {
        if (!data || !selectedPeriod || !data[periodType]) return null;
        return data[periodType][selectedPeriod] || null;
      }, [data, periodType, selectedPeriod]);

      const dimData = useMemo(() => {
        if (!periodData) return {};
        return periodData[dim] || {};
      }, [periodData, dim]);

      // Available periods for current type
      const availPeriods = useMemo(() => {
        if (!data || !data[periodType]) return [];
        return Object.keys(data[periodType]).filter(k => !k.startsWith('_')).sort().reverse();
      }, [data, periodType]);

      // KPI summary
      const kpi = useMemo(() => {
        const entries = Object.entries(dimData).filter(([k]) => !k.startsWith('_'));
        const totalOverseas = entries.reduce((s, [,v]) => s + (v.overseasRev || 0), 0);
        const totalRev = entries.reduce((s, [,v]) => s + (v.totalRev || 0), 0);
        const weightedYoy = entries.reduce((s, [,v]) => s + ((v.yoy || 0) * (v.overseasRev || 0)), 0);
        const totalOverseasForYoy = entries.reduce((s, [,v]) => s + (v.yoy != null ? (v.overseasRev || 0) : 0), 0);
        const avgYoy = totalOverseasForYoy > 0 ? weightedYoy / totalOverseasForYoy : null;
        const coverage = periodData?._coverage || 0;
        const ratio = totalRev > 0 ? totalOverseas / totalRev * 100 : 0;
        return { totalOverseas, totalRev, ratio, avgYoy, coverage };
      }, [dimData, periodData]);

      // Sorted table rows
      const tableRows = useMemo(() => {
        return Object.entries(dimData)
          .filter(([k]) => !k.startsWith('_'))
          .map(([name, v]) => ({ name, ...v }))
          .sort((a, b) => {
            const va = a[sortKey] ?? -Infinity;
            const vb = b[sortKey] ?? -Infinity;
            return sortAsc ? va - vb : vb - va;
          });
      }, [dimData, sortKey, sortAsc]);

      // 5-year trend for chart — reads from selected dimension groups
      const trendData = useMemo(() => {
        if (!data || !data[periodType]) return { years: [], groups: [], series: [], ratioLine: [] };
        const dates = Object.keys(data[periodType]).filter(k => !k.startsWith('_')).sort();
        // Collect all unique group names across all periods
        const groupSet = new Set();
        const periodGroups = {};
        dates.forEach(date => {
          const pd = data[periodType][date];
          const dimData = pd?.[dim] || {};
          const groups = {};
          Object.entries(dimData).filter(([k]) => !k.startsWith('_')).forEach(([name, v]) => {
            groupSet.add(name);
            groups[name] = v;
          });
          periodGroups[date] = groups;
        });
        const groups = [...groupSet];
        const years = dates.map(d => d.slice(0,4));
        // Build series data per group (stacked bars)
        const series = groups.map(groupName => ({
          name: groupName,
          data: dates.map(date => {
            const g = periodGroups[date]?.[groupName];
            return g?.overseasRev || 0;
          })
        }));
        // Build ratio line (total overseas / total revenue)
        const ratioLine = dates.map(date => {
          const pd = data[periodType][date];
          const dimData = pd?.[dim] || {};
          const entries = Object.entries(dimData).filter(([k]) => !k.startsWith('_'));
          const totalOverseas = entries.reduce((s, [,v]) => s + (v.overseasRev || 0), 0);
          const totalRev = entries.reduce((s, [,v]) => s + (v.totalRev || 0), 0);
          return totalRev > 0 ? +(totalOverseas / totalRev * 100).toFixed(1) : 0;
        });
        return { years, groups, series, ratioLine };
      }, [data, periodType, dim]);

      // Render ECharts trend — stacked bars per group + ratio line
      useEffect(() => {
        if (!chartRef.current || !trendData.years?.length) return;
        if (!chartInst.current) {
          chartInst.current = echarts.init(chartRef.current, null, { renderer: 'canvas' });
        }
        const colors = ['#d4af37','#4fc3f7','#e74c3c','#27ae60','#9b59b6','#f39c12','#1abc9c','#e67e22',
                        '#3498db','#e91e63','#00bcd4','#ff9800','#8bc34a','#673ab7','#cddc39'];
        const barSeries = trendData.series.map((s, i) => ({
          name: s.name, type: 'bar', stack: 'total',
          data: s.data,
          itemStyle: { color: colors[i % colors.length], borderRadius: i === trendData.series.length - 1 ? [3,3,0,0] : 0 },
          barMaxWidth: 50,
          emphasis: { focus: 'series' }
        }));
        chartInst.current.setOption({
          tooltip: { trigger: 'axis', backgroundColor: '#111118', borderColor: '#1e1e2a',
            textStyle: { color: '#e8d49b', fontFamily: 'JetBrains Mono', fontSize: 11 },
            formatter: function(params) {
              let html = '<div style="font-weight:bold;margin-bottom:4px">' + params[0].axisValue + '</div>';
              let total = 0;
              params.forEach(function(p) {
                if (p.seriesType === 'bar') {
                  total += p.value;
                  var val = p.value >= 1e12 ? (p.value/1e12).toFixed(2)+'万亿' : p.value >= 1e8 ? (p.value/1e8).toFixed(0)+'亿' : (p.value/1e4).toFixed(0)+'万';
                  html += '<div style="display:flex;justify-content:space-between;gap:16px"><span>' + p.marker + p.seriesName + '</span><span style="font-weight:bold">' + val + '</span></div>';
                }
              });
              var totalStr = total >= 1e12 ? (total/1e12).toFixed(2)+'万亿' : (total/1e8).toFixed(0)+'亿';
              html += '<div style="border-top:1px solid #1e1e2a;margin-top:4px;padding-top:4px;display:flex;justify-content:space-between"><span>合计</span><span style="font-weight:bold;color:#d4af37">' + totalStr + '</span></div>';
              var ratioParam = params.find(function(p) { return p.seriesType === 'line'; });
              if (ratioParam) html += '<div style="color:#4fc3f7">海外占比: ' + ratioParam.value + '%</div>';
              return html;
            }
          },
          legend: { type: 'scroll', bottom: 0, textStyle: { color: '#8a8a6a', fontSize: 10 },
            pageTextStyle: { color: '#8a8a6a' }, pageIconColor: '#d4af37',
            data: [...trendData.series.map(s => s.name), '海外占比'] },
          grid: { left: 60, right: 60, top: 30, bottom: trendData.groups.length > 6 ? 60 : 40 },
          xAxis: { type: 'category', data: trendData.years,
            axisLine: { lineStyle: { color: '#1e1e2a' } },
            axisLabel: { color: '#8a8a6a', fontFamily: 'JetBrains Mono' } },
          yAxis: [
            { type: 'value', name: '海外营收', nameTextStyle: { color: '#8a8a6a', fontSize: 10 },
              axisLine: { show: false }, splitLine: { lineStyle: { color: '#1e1e2a' } },
              axisLabel: { color: '#8a8a6a', formatter: function(v) { return v >= 1e12 ? (v/1e12).toFixed(1)+'万亿' : (v/1e8).toFixed(0)+'亿'; },
                fontFamily: 'JetBrains Mono', fontSize: 10 } },
            { type: 'value', name: '占比(%)', nameTextStyle: { color: '#8a8a6a', fontSize: 10 },
              axisLine: { show: false }, splitLine: { show: false },
              axisLabel: { color: '#4fc3f7', formatter: '{value}%',
                fontFamily: 'JetBrains Mono', fontSize: 10 } }
          ],
          series: [
            ...barSeries,
            { name: '海外占比', type: 'line', yAxisIndex: 1, data: trendData.ratioLine,
              lineStyle: { color: '#4fc3f7', width: 2 },
              itemStyle: { color: '#4fc3f7' },
              symbol: 'circle', symbolSize: 6,
              z: 10 }
          ]
        }, true);
        return () => {};
      }, [trendData]);

      // Resize chart on window resize
      useEffect(() => {
        const handler = () => chartInst.current?.resize();
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      const handleSort = (key) => {
        if (sortKey === key) setSortAsc(!sortAsc);
        else { setSortKey(key); setSortAsc(false); }
      };

      const handleLbSort = (key) => {
        if (lbSortKey === key) setLbSortAsc(!lbSortAsc);
        else { setLbSortKey(key); setLbSortAsc(false); }
      };

      const sortedTopOverseas = useMemo(() => {
        if (!data?.topOverseas) return [];
        if (!lbSortKey) return data.topOverseas;
        return [...data.topOverseas].sort((a, b) => {
          const va = a[lbSortKey] ?? -Infinity;
          const vb = b[lbSortKey] ?? -Infinity;
          return lbSortAsc ? va - vb : vb - va;
        });
      }, [data?.topOverseas, lbSortKey, lbSortAsc]);

      const fmtRev = (v) => {
        if (v == null) return '-';
        if (Math.abs(v) >= 1e12) return (v / 1e12).toFixed(2) + '万亿';
        if (Math.abs(v) >= 1e8) return (v / 1e8).toFixed(0) + '亿';
        if (Math.abs(v) >= 1e4) return (v / 1e4).toFixed(0) + '万';
        return v.toFixed(0);
      };

      if (!data && market === 'cn') return (
        <div className="text-center py-20">
          <div className="text-gold text-lg mb-2">加载市场数据中...</div>
          <div className="text-txt-dim text-xs">首次加载可能需要数秒</div>
        </div>
      );

      // US/HK: no market-wide data, show quick access board
      if (market !== 'cn') {
        const quickStocks = QUICK_STOCKS_BY_MARKET[market] || [];
        return (
          <div className="space-y-5">
            <div className="text-center py-8">
              <h2 className="text-gold font-bold text-base">{MARKET_LABELS[market]}市场概览</h2>
              <div className="text-txt-dim text-[10px] mt-2">
                点击上方快速按钮或使用搜索栏查看{MARKET_LABELS[market]}个股财务数据
              </div>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {quickStocks.map(([c, n]) => (
                <button key={c} onClick={() => onStockClick(c)}
                  className="bg-card border border-border rounded p-3 text-center hover:border-gold/40 transition">
                  <div className="text-gold text-sm font-bold">{n}</div>
                  <div className="text-txt-dim text-[10px] mt-1">{c}</div>
                </button>
              ))}
            </div>
          </div>
        );
      }

      if (!data) return (
        <div className="text-center py-20">
          <div className="text-gold text-lg mb-2">加载市场数据中...</div>
          <div className="text-txt-dim text-xs">首次加载可能需要数秒</div>
        </div>
      );

      const sparse = periodData?._sparse;
      const maxRatio = Math.max(...tableRows.map(r => r.ratio || 0), 1);

      return (
        <div className="space-y-5">
          {/* Header */}
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-3">
            <div>
              <h2 className="text-gold font-bold text-base">A股出海营收全景</h2>
              <div className="text-txt-dim text-[10px]">
                {data.meta?.stockCount || 0} 只股票 · 数据来源: 东方财富 · 更新: {data.meta?.generatedAt?.slice(0,10) || '-'}
              </div>
            </div>
            <div className="flex flex-wrap gap-1.5">
              {Object.entries(DIM_LABELS).map(([k, v]) => (
                <button key={k} onClick={() => setDim(k)}
                  className={`px-3 py-1.5 text-[11px] rounded border transition ${
                    dim === k ? 'border-gold text-gold bg-gold/10' : 'border-border text-txt-dim hover:text-txt hover:border-gold/40'
                  }`}>{v}</button>
              ))}
            </div>
          </div>

          {/* Period selectors */}
          <div className="flex flex-wrap items-center gap-2">
            <div className="flex gap-1">
              {Object.entries(PERIOD_LABELS).map(([k, v]) => (
                <button key={k} onClick={() => { setPeriodType(k); setSelectedPeriod(null); }}
                  className={`px-2.5 py-1 text-[10px] rounded transition ${
                    periodType === k ? 'bg-gold/20 text-gold font-bold' : 'text-txt-dim hover:text-txt'
                  }`}>{v}</button>
              ))}
            </div>
            <div className="w-px h-4 bg-border mx-1" />
            <div className="flex gap-1 flex-wrap">
              {availPeriods.map(d => (
                <button key={d} onClick={() => setSelectedPeriod(d)}
                  className={`px-2 py-1 text-[10px] rounded font-mono transition ${
                    selectedPeriod === d ? 'bg-gold/20 text-gold font-bold' : 'text-txt-dim hover:text-txt'
                  }`}>{d.slice(0,4)}</button>
              ))}
            </div>
          </div>

          {/* Sparse warning */}
          {sparse && (
            <div className="border border-gold/30 rounded px-3 py-2 text-[11px] text-gold/80 bg-gold/5">
              该报告期地区分拆数据覆盖不足（仅 {periodData?._coverage || 0} 只），建议参考年报/中报数据
            </div>
          )}

          {/* KPI Cards */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            <div className="bg-card border border-border rounded p-3">
              <div className="text-txt-dim text-[10px] mb-1">海外营收合计</div>
              <div className="text-gold font-bold text-lg">{fmtRev(kpi.totalOverseas)}</div>
            </div>
            <div className="bg-card border border-border rounded p-3">
              <div className="text-txt-dim text-[10px] mb-1">海外占比</div>
              <div className="text-gold font-bold text-lg">{kpi.ratio?.toFixed(1) || '-'}%</div>
            </div>
            <div className="bg-card border border-border rounded p-3">
              <div className="text-txt-dim text-[10px] mb-1">同比增速</div>
              <div className={`font-bold text-lg ${kpi.avgYoy >= 0 ? 'text-up' : 'text-down'}`}>
                {kpi.avgYoy != null ? (kpi.avgYoy >= 0 ? '+' : '') + kpi.avgYoy.toFixed(1) + '%' : '-'}
              </div>
            </div>
            <div className="bg-card border border-border rounded p-3">
              <div className="text-txt-dim text-[10px] mb-1">覆盖股票</div>
              <div className="text-gold font-bold text-lg">{kpi.coverage}<span className="text-txt-dim text-xs font-normal">只</span></div>
            </div>
          </div>

          {/* Trend Chart */}
          {!sparse && trendData.years?.length > 1 && (
            <InfoCard title={`${PERIOD_LABELS[periodType]}海外营收趋势`}>
              <div ref={chartRef} style={{ width: '100%', height: 350 }} />
            </InfoCard>
          )}
