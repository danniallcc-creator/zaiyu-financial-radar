          {/* Industry Heatmap Table */}
          {!sparse && tableRows.length > 0 && (
            <InfoCard title={`${DIM_LABELS[dim]}出海数据 · ${selectedPeriod?.slice(0,4) || ''} ${PERIOD_LABELS[periodType]}`}>
              <div className="overflow-x-auto">
                <table className="w-full text-[11px]">
                  <thead>
                    <tr className="border-b border-border">
                      <th className="text-left py-2 px-2 text-txt-dim font-medium bg-bg">{DIM_LABELS[dim]}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleSort('overseasRev')}>
                        海外收入 {sortKey==='overseasRev' ? (sortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleSort('ratio')}>
                        占比 {sortKey==='ratio' ? (sortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleSort('yoy')}>
                        同比 {sortKey==='yoy' ? (sortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleSort('gm')}>
                        毛利率 {sortKey==='gm' ? (sortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleSort('n')}>
                        公司数 {sortKey==='n' ? (sortAsc?'↑':'↓') : ''}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {tableRows.map((r, i) => {
                      const heatAlpha = r.ratio ? Math.min(r.ratio / maxRatio * 0.35, 0.35) : 0;
                      return (
                        <tr key={r.name} className={`border-b border-border/50 ${i % 2 ? 'bg-card/50' : ''}`}
                          style={{ backgroundColor: `rgba(212,175,55,${heatAlpha})` }}>
                          <td className="py-1.5 px-2 font-medium text-txt">{r.name}</td>
                          <td className="py-1.5 px-2 text-right font-mono text-gold">{fmtRev(r.overseasRev)}</td>
                          <td className="py-1.5 px-2 text-right font-mono">{r.ratio?.toFixed(1) || '-'}%</td>
                          <td className={`py-1.5 px-2 text-right font-mono ${yoyColor(r.yoy)}`}>
                            {r.yoy != null ? (r.yoy >= 0 ? '+' : '') + r.yoy.toFixed(1) + '%' : '-'}
                          </td>
                          <td className="py-1.5 px-2 text-right font-mono">{r.gm != null ? r.gm.toFixed(1) + '%' : '-'}</td>
                          <td className="py-1.5 px-2 text-right text-txt-dim">{r.n}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </InfoCard>
          )}

          {/* Top 100 Leaderboard */}
          {data.topOverseas?.length > 0 && periodType === 'annual' && (
            <InfoCard title={`出海营收 TOP 100 · ${data.topOverseas[0]?.overseasRev ? '最新年报' : ''}`}>
              <div className="overflow-x-auto">
                <table className="w-full text-[11px]">
                  <thead>
                    <tr className="border-b border-border">
                      <th className="text-center py-2 px-1.5 text-txt-dim font-medium bg-bg w-8">#</th>
                      <th className="text-left py-2 px-2 text-txt-dim font-medium bg-bg">公司</th>
                      <th className="text-left py-2 px-2 text-txt-dim font-medium bg-bg">代码</th>
                      <th className="text-left py-2 px-2 text-txt-dim font-medium bg-bg">行业</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleLbSort('totalRev')}>
                        {data.meta?.latestYear || ''}总营收 {lbSortKey==='totalRev' ? (lbSortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleLbSort('totalRevYoy')}>
                        营收同比 {lbSortKey==='totalRevYoy' ? (lbSortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleLbSort('overseasRev')}>
                        海外收入 {lbSortKey==='overseasRev' ? (lbSortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleLbSort('ratio')}>
                        占比 {lbSortKey==='ratio' ? (lbSortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleLbSort('yoy')}>
                        同比 {lbSortKey==='yoy' ? (lbSortAsc?'↑':'↓') : ''}</th>
                      <th className="text-right py-2 px-2 text-txt-dim font-medium bg-bg cursor-pointer hover:text-gold"
                        onClick={() => handleLbSort('totalMV')}>
                        总市值 {lbSortKey==='totalMV' ? (lbSortAsc?'↑':'↓') : ''}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedTopOverseas.map((s, i) => (
                      <tr key={s.code} className={`border-b border-border/50 ${i % 2 ? 'bg-card/50' : ''} hover:bg-gold/5`}>
                        <td className="py-1.5 px-1.5 text-center text-txt-dim font-mono">{i+1}</td>
                        <td className="py-1.5 px-2">
                          <button onClick={() => onStockClick?.(s.code)}
                            className="text-gold hover:text-gold-light transition text-left">
                            {s.name || s.code}
                          </button>
                        </td>
                        <td className="py-1.5 px-2 font-mono text-txt-dim">{s.code}</td>
                        <td className="py-1.5 px-2 text-txt-dim">{s.sw}</td>
                        <td className="py-1.5 px-2 text-right font-mono">{fmtRev(s.totalRev)}</td>
                        <td className={`py-1.5 px-2 text-right font-mono ${yoyColor(s.totalRevYoy)}`}>
                          {s.totalRevYoy != null ? (s.totalRevYoy >= 0 ? '+' : '') + s.totalRevYoy.toFixed(1) + '%' : '-'}
                        </td>
                        <td className="py-1.5 px-2 text-right font-mono text-gold">{fmtRev(s.overseasRev)}</td>
                        <td className="py-1.5 px-2 text-right font-mono">{s.ratio?.toFixed(1) || '-'}%</td>
                        <td className={`py-1.5 px-2 text-right font-mono ${yoyColor(s.yoy)}`}>
                          {s.yoy != null ? (s.yoy >= 0 ? '+' : '') + s.yoy.toFixed(1) + '%' : '-'}
                        </td>
                        <td className="py-1.5 px-2 text-right font-mono">{s.totalMV ? fmtRev(s.totalMV) : '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </InfoCard>
          )}
        </div>
      );
    };

    // ─── App ────────────────────────────────────────────────────────────────
    const MARKET_LABELS = { cn: 'A股', us: '美股', hk: '港股' };

    const App = () => {
      const [data, setData] = useState(null);
      const [tab, setTab] = useState(0);
      const [code, setCode] = useState('');
      const [market, setMarket] = useState('cn');

      const handleLoad = useCallback((d) => {
        setData(d);
        setCode(d.code || d.profile?.code || '');
        if (d.market) setMarket(d.market);
        else setMarket(detectMarket(d.code || d.profile?.code || ''));
        setTab(1);
      }, []);

      const handleMarketChange = useCallback((m) => {
        setMarket(m);
        setData(null);
        setCode('');
        setTab(0);
      }, []);

      // Handle clicking a stock in MarketOverview leaderboard
      const handleStockClick = useCallback((stockCode) => {
        fetchData(stockCode)
          .then(d => { if (d) handleLoad(d); })
          .catch(() => {});
      }, [handleLoad]);

      // Auto-load default stock based on market
      useEffect(() => {
        const defaults = { cn: '600519', us: 'AAPL', hk: '00700' };
        fetchData(defaults[market] || '600519')
          .then(d => { if (d) { setData(d); setCode(d.code || d.profile?.code || ''); } })
          .catch(() => {});
      }, [market]);

      const renderTab = () => {
        if (tab === 0) return <MarketOverview onStockClick={handleStockClick} market={market} />;
        if (!data) return null;
        switch (tab) {
          case 1: return <DataOverview data={data} />;
          case 2: return <FinancialQuality data={data} />;
          case 3: return <ManagementExpr data={data} />;
          case 4: return <ShareholderDividend data={data} />;
          case 5: return <IndustryCompare data={data} />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-bg text-txt font-mono">
          {/* Header */}
          <header className="border-b border-border px-4 py-3">
            <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
              <div>
                <h1 className="text-gold font-bold text-lg tracking-wide">全球上市公司财务雷达</h1>
                <div className="text-txt-dim text-[10px]">Financial Radar / Global Report Analyzer</div>
              </div>
              <div className="flex flex-col gap-2 items-end">
                <div className="flex gap-1">
                  {Object.entries(MARKET_LABELS).map(([m, label]) => (
                    <button key={m} onClick={() => handleMarketChange(m)}
                      className={`px-3 py-1 text-xs font-bold rounded border transition ${
                        market === m
                          ? 'bg-gold/15 border-gold text-gold'
                          : 'border-border text-txt-dim hover:text-txt hover:border-gold/40'
                      }`}>
                      {label}
                    </button>
                  ))}
                </div>
                <SearchBar onLoad={handleLoad} market={market} />
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="max-w-6xl mx-auto px-4 py-4">
            {tab === 0 || data ? (
              <>
                {/* Stock header — only show when viewing stock detail tabs */}
                {data && tab > 0 && (
                  <>
                    <div className="flex flex-wrap items-baseline gap-x-3 gap-y-1 mb-4">
                      <span className="text-gold font-bold text-xl">{data.profile?.name || data.name}</span>
                      <span className="text-txt-dim text-sm">{code}</span>
                      {data.quote && (
                        <>
                          <span className={`text-sm font-bold ${data.quote.changePct >= 0 ? 'text-up' : 'text-down'}`}>
                            {data.quote.price?.toFixed(2)}
                          </span>
                          <span className={`text-xs ${data.quote.changePct >= 0 ? 'text-up' : 'text-down'}`}>
                            {formatPct(data.quote.changePct)}
                          </span>
                        </>
                      )}
                    </div>
                    <div className="text-txt-dim text-[10px] mb-2 flex flex-wrap gap-x-3">
                      <span>数据获取: {data.fetchTime ? new Date(data.fetchTime).toLocaleString('zh-CN') : '-'}</span>
                      {data.quote?.fetchTime && (
                        <span className="text-gold/60">行情: {new Date(data.quote.fetchTime).toLocaleString('zh-CN')}</span>
                      )}
                    </div>
                  </>
                )}

                <TabBar active={tab} onChange={setTab} />
                <div className="mt-4">
                  {renderTab()}
                </div>
              </>
            ) : (
              <div className="text-center py-32">
                <div className="text-gold text-2xl font-bold mb-4">全球上市公司财务雷达</div>
                <div className="text-txt-dim text-sm mb-8 max-w-md mx-auto leading-relaxed">
                  输入{MARKET_LABELS[market]}股票代码加载财务数据。数据来源于东方财富 / SEC EDGAR，由本地 ETL 预处理为 JSON。
                  支持数据透视、财务质量分析、股东分红查看等功能。
                </div>
                <div className="text-txt-dim text-xs">
                  {market === 'cn' && '示例: 600519 (贵州茅台) / 000858 (五粮液) / 601318 (中国平安)'}
                  {market === 'us' && '示例: AAPL (苹果) / MSFT (微软) / NVDA (英伟达)'}
                  {market === 'hk' && '示例: 00700 (腾讯) / 09988 (阿里巴巴) / 03690 (美团)'}
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-border mt-8 px-4 py-3" style={{ paddingBottom: 'max(12px, env(safe-area-inset-bottom))' }}>
            <div className="max-w-6xl mx-auto text-[10px] text-txt-dim text-center">
              全球上市公司财务雷达 / 数据来源: 东方财富 · SEC EDGAR · 腾讯财经 / 仅供研究参考，不构成投资建议
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
